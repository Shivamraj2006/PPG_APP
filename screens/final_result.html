<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md">
<!-- Top Navigation Anchor -->
<header class="bg-[#1e1e2e]/80 backdrop-blur-lg border-b border-[#313244] fixed top-0 left-0 w-full z-50 flex justify-between items-center px-5 h-16">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#89dceb]" data-icon="waves">waves</span>
<span class="font-['Space_Grotesk'] font-bold tracking-wider text-xl font-black text-[#89dceb] drop-shadow-[0_0_8px_rgba(137,226,235,0.5)]">GLUCOWAVE</span>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#a6adc8] hover:text-[#89dceb] transition-colors cursor-pointer" data-icon="sensors">sensors</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile pt-2xl pb-2xl">
<!-- Header Text -->
<div class="mb-xl text-center">
<h1 class="font-headline-lg text-headline-lg text-[#89dceb] tracking-widest uppercase">MEASUREMENT COMPLETE</h1>
</div>
<!-- Result Hero Card -->
<section class="w-full max-w-md bg-surface-container rounded-3xl p-xl flex flex-col items-center justify-center relative overflow-hidden border border-[#313244]">
<!-- Decorative background glow -->
<div class="absolute inset-0 bg-gradient-to-b from-[#a6e3a1]/5 to-transparent pointer-events-none"></div>
<div class="z-10 text-center">
<span class="font-label-bold text-label-bold text-on-surface-variant uppercase mb-xs block">Current Level</span>
<div class="relative inline-block">
<h2 class="font-display-bold text-[80px] leading-tight font-bold text-[#a6e3a1] glow-green">
                        108
                    </h2>
</div>
<p class="font-headline-md text-headline-md text-[#a6e3a1] mt-[-10px] mb-lg">mg/dL</p>
<!-- Normal Range Bar Indicator -->
<div class="w-full max-w-[240px] mx-auto mt-lg">
<div class="flex justify-between items-center mb-xs px-1">
<span class="text-[10px] font-label-bold text-on-surface-variant">70</span>
<span class="text-[10px] font-label-bold text-[#a6e3a1]">NORMAL RANGE</span>
<span class="text-[10px] font-label-bold text-on-surface-variant">140</span>
</div>
<div class="h-1.5 w-full bg-[#313244] rounded-full overflow-hidden relative">
<div class="absolute left-[20%] right-[20%] h-full bg-[#a6e3a1]/20 rounded-full"></div>
<div class="absolute h-full w-1.5 bg-[#a6e3a1] rounded-full left-[54%] transform -translate-x-1/2 glow-green"></div>
</div>
</div>
</div>
</section>
<!-- Insights Bento Grid -->
<div class="grid grid-cols-2 gap-md w-full max-w-md mt-lg">
<div class="bg-surface-container-low p-md rounded-2xl border border-[#313244]">
<div class="flex items-center gap-2 mb-xs text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]" data-icon="timer">timer</span>
<span class="text-[10px] font-label-bold uppercase">Time</span>
</div>
<div class="font-data-mono text-data-mono text-[#89dceb]">08:42 AM</div>
</div>
<div class="bg-surface-container-low p-md rounded-2xl border border-[#313244]">
<div class="flex items-center gap-2 mb-xs text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]" data-icon="trending_down">trending_down</span>
<span class="text-[10px] font-label-bold uppercase">Trend</span>
</div>
<div class="font-data-mono text-data-mono text-[#89dceb]">Stable</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col w-full max-w-md mt-2xl gap-md">
<button class="w-full h-16 border-2 border-primary-container text-primary-container font-headline-md rounded-2xl glow-cyan flex items-center justify-center gap-3 active:scale-[0.98] transition-all duration-150">
<span class="material-symbols-outlined" data-icon="ios_share">ios_share</span>
                SHARE REPORT
            </button>
<button class="w-full py-4 text-on-surface-variant font-label-bold uppercase tracking-widest flex items-center justify-center gap-2 hover:text-[#89dceb] transition-colors active:scale-95">
<span class="material-symbols-outlined" data-icon="refresh">refresh</span>
                START NEW SCAN
            </button>
</div>
<!-- Footer Visual Hint -->
<div class="mt-xl opacity-20">
<img class="w-24 h-auto mx-auto grayscale invert" data-alt="minimalist scientific waveform graphic with cyan lines on a dark background representing abstract medical data flow" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCcXsUTp1KNbeff5HLsLsS5A5MpMMU82nN_y5EBd6LZsAGVNrzEMQ_nkzsN4xO_07ufmpcIuQVK6nbDsX3tiqtm2H7ABR3HIzCu8EaGaISIoiduFGHLCtdFClzLIGxFP7gEkxFSuYNbiyPrVySpjCiooZ6RapJAHFOEpLVS1CxRWihmPgUBZiAI7YB36VVj1F7USS7PrH8XRQxakyc2I7bhuYmeBENllJv3OKXb10_yixocHMZmDGLGYZgvwKwlVtaXB528XGXbA3G2"/>
</div>
</main>

<a class="flex flex-col items-center justify-center text-[#89dceb] bg-[#313244] rounded-xl px-4 py-1.5 shadow-[0_0_15px_rgba(137,226,235,0.15)] active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="query_stats">query_stats</span>
<span class="font-['Space_Grotesk'] text-[10px] font-medium uppercase tracking-widest mt-1">Track</span>
</a>
<a class="flex flex-col items-center justify-center text-[#6c7086] hover:bg-[#45475a] rounded-xl transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="Show_chart">show_chart</span>
<span class="font-['Space_Grotesk'] text-[10px] font-medium uppercase tracking-widest mt-1">Trends</span>
</a>
<a class="flex flex-col items-center justify-center text-[#6c7086] hover:bg-[#45475a] rounded-xl transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-['Space_Grotesk'] text-[10px] font-medium uppercase tracking-widest mt-1">Logs</span>
</a>
<a class="flex flex-col items-center justify-center text-[#6c7086] hover:bg-[#45475a] rounded-xl transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Space_Grotesk'] text-[10px] font-medium uppercase tracking-widest mt-1">Profile</span>
</a>
</nav>
