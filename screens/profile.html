            color: #e3e0f7;

<body class="font-body-md text-body-md pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-5 h-16 bg-[#1e1e2e]/80 backdrop-blur-lg border-b border-[#313244]">
<div class="flex items-center gap-4">
<button class="active:scale-95 transition-transform text-[#89dceb]">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-['Space_Grotesk'] font-bold tracking-wider text-xl font-black tracking-tighter text-[#89dceb] drop-shadow-[0_0_10px_rgba(137,220,235,0.3)]">GLUCOWAVE</h1>
</div>
<button class="active:scale-95 transition-transform text-[#89dceb]">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<main class="mt-20 px-margin-mobile max-w-2xl mx-auto space-y-xl">
<!-- User Section -->
<section class="flex flex-col items-center py-lg">
<div class="relative group">
<div class="w-32 h-32 rounded-full p-1 bg-gradient-to-tr from-[#89dceb] to-transparent shadow-[0_0_30px_rgba(137,220,235,0.2)]">
<img alt="Alex Rivera Profile" class="w-full h-full object-cover rounded-full border-4 border-[#121221]" data-alt="Close-up professional portrait of a confident man in his 30s with short hair, soft studio lighting on dark blue background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDwWOs2sKAvF2MGztzf_or_rn14OxDgbJ-n5catZ43eTMu343eQlb220dwkoWdVjxefpVMjjKS9s1IePA9fTyKiGE587IL4mGb3iH-Ko8bdxuGPU-9F_eAQS9XR55Qv1iG45mrFpRdxsgzCMCKdxfdrjaEBHxtAoI8FQA7OR0qBHEO-QumcnWEA8N3-gGYJbnCXGRLiy_MQLcVjMu3S0pnsaRJaYf9BP1-lbL1BOtNFbORC9l8zRgVo731eKw2sU6tRFTMnrph2GWF6"/>
</div>
<button class="absolute bottom-1 right-1 bg-primary-container text-on-primary-container p-2 rounded-full shadow-lg active:scale-90 transition-all border-2 border-[#121221]">
<span class="material-symbols-outlined text-[20px]">edit</span>
</button>
</div>
<h2 class="mt-md font-display-bold text-headline-lg text-[#89dceb] glowing-cyan">Alex Rivera</h2>
<p class="text-on-surface-variant font-label-bold">PREMIUM MEMBER • ID: 88241</p>
</section>
<!-- Information Bento Grid -->
<section class="grid grid-cols-2 gap-md">
<div class="glass-card col-span-2 p-md rounded-xl flex items-center gap-md">
<div class="bg-surface-container-high p-sm rounded-lg text-[#89dceb]">
<span class="material-symbols-outlined">call</span>
</div>
<div>
<p class="text-xs text-on-surface-variant uppercase tracking-widest font-bold">Phone</p>
<p class="font-data-mono text-body-lg text-[#89dceb]">+1 (555) 012-3456</p>
</div>
</div>
<div class="glass-card p-md rounded-xl space-y-xs">
<div class="flex justify-between items-start">
<span class="material-symbols-outlined text-secondary">monitor_weight</span>
<span class="text-[10px] bg-secondary/10 text-secondary px-2 py-0.5 rounded-full font-bold">-2kg</span>
</div>
<p class="text-xs text-on-surface-variant uppercase tracking-widest font-bold">Weight</p>
<p class="font-data-mono text-headline-md text-on-surface">72 <span class="text-sm font-normal">kg</span></p>
</div>
<div class="glass-card p-md rounded-xl space-y-xs">
<div class="flex justify-between items-start">
<span class="material-symbols-outlined text-[#89dceb]">straighten</span>
</div>
<p class="text-xs text-on-surface-variant uppercase tracking-widest font-bold">Height</p>
<p class="font-data-mono text-headline-md text-on-surface">178 <span class="text-sm font-normal">cm</span></p>
</div>
<div class="glass-card p-md rounded-xl space-y-xs col-span-2 flex justify-between items-center bg-gradient-to-r from-[#313244] to-transparent">
<div>
<p class="text-xs text-on-surface-variant uppercase tracking-widest font-bold">Blood Type</p>
<p class="font-display-bold text-headline-lg text-error glowing-cyan">O+</p>
</div>
<div class="h-12 w-12 rounded-full border border-[#313244] flex items-center justify-center">
<span class="material-symbols-outlined text-error text-3xl" style="font-variation-settings: 'FILL' 1;">bloodtype</span>
</div>
</div>
</section>

<h3 class="text-on-surface-variant font-label-bold px-2 uppercase tracking-tighter">Medical Management</h3>
<button class="w-full glass-card p-lg rounded-xl flex items-center justify-between hover:bg-surface-variant/50 transition-colors group">
<div class="flex items-center gap-md">
<div class="bg-surface-container-high p-sm rounded-lg text-primary">
<span class="material-symbols-outlined">history_edu</span>
</div>
<span class="font-headline-md text-body-lg">Medical History</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
<button class="w-full glass-card p-lg rounded-xl flex items-center justify-between hover:bg-surface-variant/50 transition-colors group">
<div class="flex items-center gap-md">
<div class="bg-surface-container-high p-sm rounded-lg text-error">
<span class="material-symbols-outlined">contact_emergency</span>
</div>
<span class="font-headline-md text-body-lg">Emergency Contacts</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
<button class="w-full glass-card p-lg rounded-xl flex items-center justify-between hover:bg-surface-variant/50 transition-colors group">
<div class="flex items-center gap-md">
<div class="bg-surface-container-high p-sm rounded-lg text-secondary">
<span class="material-symbols-outlined">settings_applications</span>
</div>
<span class="font-headline-md text-body-lg">App Settings</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
</section>
<!-- Danger Zone -->
<section class="pt-lg">
<button class="w-full py-md text-error/60 font-label-bold hover:text-error transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm">logout</span>
                Sign Out of GlucoWave
            </button>
</section>
</main>

<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center h-20 pb-safe px-4 bg-[#1e1e2e]/80 backdrop-blur-lg border-t border-[#313244] shadow-[0_-4px_20px_rgba(0,0,0,0.4)] rounded-t-lg">

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-['Space_Grotesk'] text-[10px] font-medium mt-1">Profile</span>
</a>
